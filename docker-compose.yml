version: '3.8'
services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: eventia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d eventia_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://admin:password123@db:5432/eventia_db"
      AI_SERVICE_URL: "http://ai-service:8000"
      JWT_SECRET: "local-docker-secret"
      NODE_ENV: "production"
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:4000"
    depends_on:
      - backend

volumes:
  postgres_data:
